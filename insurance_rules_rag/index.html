<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Insurance Rule Validator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #111827;
      color: white;
    }

    h1 {
      font-size: 42px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 15px;
      font-size: 18px;
      margin-top: 20px;
      border-radius: 10px;
    }

    button {
      margin-top: 20px;
      padding: 14px 24px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 8px;
      border: none;
    }

    #result {
      margin-top: 30px;
      background: #1f2937;
      padding: 25px;
      border-radius: 12px;
    }

    .badge {
      padding: 15px;
      border-radius: 10px;
      font-size: 22px;
      font-weight: bold;
    }

    .rule-card {
      background: #111827;
      padding: 15px;
      border-radius: 10px;
      margin-top: 12px;
      border: 1px solid #374151;
    }
  </style>
</head>

<body>
  <h1>Insurance Rule Validator</h1>

  <textarea id="ruleInput">if driver_country is israel then increase_premium</textarea>

  <br />

  <button onclick="checkRule()">Check Rule</button>

  <div id="result"></div>

  <script>
    async function checkRule() {
      const rule = document.getElementById("ruleInput").value;

      const response = await fetch("http://localhost:3000/check-rule", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ rule })
      });

      const data = await response.json();

      let color = "#10b981";

      if (data.recommendation === "High_Severity_Match") {
        color = "#ef4444";
      }

      if (data.recommendation === "Duplicated_Add_to_list") {
        color = "#f59e0b";
      }

      let similarRulesHtml = "";

      for (const item of data.similarRules || []) {
        similarRulesHtml += `
          <div class="rule-card">
            <b>Rule:</b><br/>
            ${item.rule_text}

            <br/><br/>

            <b>Distance:</b>
            ${Number(item.distance).toFixed(4)}
          </div>
        `;
      }

      document.getElementById("result").innerHTML = `
        <div class="badge" style="background:${color};">
          ${data.recommendation}
        </div>

        <p style="font-size:18px; margin-top:20px;">
          ${data.reason}
        </p>

        <h2>Matched Rule</h2>
        <div class="rule-card">
          ${data.matchedRule ? data.matchedRule.fullText : "No matched rule"}
        </div>

        <h2>Similar Rules</h2>
        ${similarRulesHtml}
      `;
    }
  </script>
</body>
</html>
